    /* ── CSS ── */

        color:var(--p); letter-spacing:.04em; box-shadow:var(--shadow);

      /* ── Cartão ── */

        background:var(--surface); border-radius:var(--radius);
        box-shadow:var(--shadow-lg); overflow:hidden; border:1px solid var(--border);

      .qp-intro h1 em { font-style:normal; color:var(--p); }
      .qp-intro p  { font-size:15px; color:var(--ink3); line-height:1.65; max-width:400px; margin:0 auto 24px; }
      .qp-pills { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:32px; }
      .qp-pill  { background:var(--surface2); border:1px solid var(--border); border-radius:100px; padding:5px 14px; font-size:13px; color:var(--ink2); font-weight:500; }

      /* ── Botões ── */
      .btn {
        display:inline-flex; align-items:center; justify-content:center; gap:8px;
        width:100%; padding:16px 24px;
        background:var(--p); color:#fff; border:none; border-radius:var(--radius-sm);
        font-family:var(--font-d); font-size:16px; font-weight:700; cursor:pointer;
        transition:transform .2s var(--spring), box-shadow .2s;
        box-shadow:0 4px 16px var(--p40); letter-spacing:.02em;
      }
      .btn:hover  { transform:translateY(-2px); box-shadow:0 8px 24px var(--p40); }
      .btn:active { transform:translateY(0); }
      .btn-ghost  { background:transparent; color:var(--p); border:2px solid var(--p20); box-shadow:none; }
      .btn-ghost:hover { background:var(--p10); box-shadow:none; transform:translateY(-1px); }

      /* ── Progresso ── */
      .qp-prog { padding:20px 28px 0; border-bottom:1px solid var(--border); }
      .qp-prog-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
      .qp-prog-lbl { font-size:12px; font-weight:600; color:var(--ink3); letter-spacing:.06em; text-transform:uppercase; }
      .qp-prog-n   { font-family:var(--font-d); font-size:13px; font-weight:700; color:var(--p); }
      .qp-track    { height:4px; background:var(--border); border-radius:2px; overflow:hidden; margin-bottom:16px; }
      .qp-fill     { height:100%; background:var(--p); border-radius:2px; transition:width .4s var(--eout); }

      /* ── Pergunta ── */
      .qp-q { padding:28px 28px 32px; animation:fadeUp .35s var(--eout) both; }
      .qp-q-badge {
        display:inline-block; background:var(--p10); color:var(--p);

        padding:4px 10px; border-radius:100px; margin-bottom:14px; border:1px solid var(--p20);
      }
      .qp-q-text { font-family:var(--font-d); font-size:clamp(1.1rem,3.5vw,1.35rem); font-weight:700; line-height:1.35; margin-bottom:24px; }
      .qp-opts   { display:grid; gap:10px; }

      /* ── Opção ── */
      .qp-opt {
        display:flex; align-items:center; gap:14px; padding:14px 16px;
        background:var(--surface); border:1.5px solid var(--border);
        border-radius:var(--radius-sm); cursor:pointer;
        font-size:14.5px; font-weight:500; color:var(--ink2);
        text-align:left; width:100%;
        transition:all .18s var(--eout);
      }
      .qp-opt:hover          { border-color:var(--p); color:var(--ink); transform:translateX(4px); box-shadow:0 2px 12px var(--p20); }
      .qp-opt:hover .dot     { border-color:var(--p); background:var(--p10); }
      .qp-opt.sel            { border-color:var(--p); background:var(--p10); color:var(--ink); transform:translateX(4px) scale(1.01); }
      .qp-opt.sel .dot       { background:var(--p); border-color:var(--p); }
      .qp-opt.sel .dot::after {
        content:''; position:absolute; width:6px; height:6px;
        background:#fff; border-radius:50%; top:50%; left:50%; transform:translate(-50%,-50%);
      }
      .qp-opt:disabled { cursor:default; }
      .dot {
        width:20px; min-width:20px; height:20px;
        border-radius:50%; border:1.5px solid var(--border);
        position:relative; transition:all .18s; flex-shrink:0;
      }

      /* ── Loading ── */
      .qp-load { padding:60px 32px; text-align:center; animation:fadeUp .4s var(--eout) both; }
      .spin-wrap { position:relative; width:80px; height:80px; margin:0 auto 28px; }
      .ring {
        position:absolute; inset:0; border-radius:50%;
        border:3px solid transparent; animation:spin 1.2s linear infinite;
      }
      .ring:nth-child(1) { border-top-color:var(--p); }
      .ring:nth-child(2) { border-right-color:var(--p40); animation-duration:1.8s; animation-direction:reverse; inset:8px; }
      .spin-core {
        position:absolute; inset:20px; background:var(--p10); border-radius:50%;
        display:flex; align-items:center; justify-content:center; font-size:20px;
        animation:pulse 2s ease-in-out infinite;
      }
      .qp-load h2 { font-family:var(--font-d); font-size:1.25rem; font-weight:700; margin-bottom:8px; }
      .qp-load p  { font-size:14px; color:var(--ink3); line-height:1.6; }
      .load-steps { display:flex; flex-direction:column; gap:8px; margin-top:28px; text-align:left; max-width:260px; margin-left:auto; margin-right:auto; }
      .load-step {
        display:flex; align-items:center; gap:10px; font-size:13px; color:var(--ink3);
        opacity:0; animation:fadeUp .4s var(--eout) both;
      }
      .load-step:nth-child(1) { animation-delay:.3s; }
      .load-step:nth-child(2) { animation-delay:.7s; }
      .load-step:nth-child(3) { animation-delay:1.1s; }
      .step-dot { width:6px; height:6px; border-radius:50%; background:var(--p); flex-shrink:0; }

      /* ── Resultado ── */
      .qp-res { animation:fadeUp .5s var(--eout) both; }
      .res-hero {

      .res-hero::before {
        content:''; position:absolute; inset:-40%;
        background:radial-gradient(circle,rgba(255,255,255,.08) 0%,transparent 60%);
      }
      .res-hero::after {
        content:''; position:absolute; top:-60px; right:-60px;
        width:200px; height:200px; background:rgba(255,255,255,.04); border-radius:50%;
      }
      .res-badge {
        display:inline-block; background:rgba(255,255,255,.18); color:rgba(255,255,255,.9);
        font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
        padding:4px 12px; border-radius:100px; margin-bottom:16px;
        border:1px solid rgba(255,255,255,.2); position:relative;
      }
      .res-icon  { font-size:44px; margin-bottom:12px; display:block; position:relative; }
      .res-sub   { font-size:13px; color:rgba(255,255,255,.7); margin-bottom:6px; position:relative; }
      .res-name  { font-family:var(--font-d); font-size:clamp(1.8rem,6vw,2.6rem); font-weight:800; color:#fff; letter-spacing:.04em; position:relative; }

      .res-body  { padding:28px 28px 36px; }
      .sec       { margin-bottom:24px; }
      .sec-title { font-family:var(--font-d); font-size:11px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--ink3); margin-bottom:12px; }
      .benefits  { display:grid; gap:8px; }
      .benefit   { display:flex; align-items:flex-start; gap:10px; font-size:14px; color:var(--ink2); line-height:1.45; }
      .chk {
        width:20px; min-width:20px; height:20px; background:var(--p10); border-radius:50%;
        display:flex; align-items:center; justify-content:center; color:var(--p);
        font-size:11px; font-weight:700; border:1px solid var(--p20); margin-top:1px;
      }
      .reason { background:var(--surface2); border-left:3px solid var(--p); border-radius:0 var(--radius-sm) var(--radius-sm) 0; padding:16px; font-size:14px; color:var(--ink2); line-height:1.65; }
      .meta-g  { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
      .meta-c  { background:var(--surface2); border:1px solid var(--border); border-radius:var(--radius-sm); padding:14px; }
      .meta-cl { font-size:11px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; color:var(--ink3); margin-bottom:4px; }
      .meta-cv { font-family:var(--font-d); font-size:13px; font-weight:700; color:var(--ink); line-height:1.35; }
      .divider { height:1px; background:var(--border); margin:24px 0; }
      .disc    { background:#fffbeb; border:1px solid #fde68a; border-radius:var(--radius-sm); padding:12px 14px; font-size:12px; color:#92400e; line-height:1.55; margin-bottom:20px; }
      .ctas    { display:grid; gap:10px; margin-bottom:14px; }
      .cta-a   {
        display:flex; align-items:center; justify-content:center; gap:10px; padding:15px 20px;
        border-radius:var(--radius-sm); font-family:var(--font-d); font-size:15px; font-weight:700;
        text-decoration:none; transition:transform .2s var(--spring), filter .15s; cursor:pointer; border:none; letter-spacing:.02em;
      }
      .cta-a:hover  { transform:translateY(-2px); filter:brightness(1.06); }
      .cta-a:active { transform:translateY(0); }
      .cta-email { background:var(--p); color:#fff; box-shadow:0 4px 16px var(--p40); }
      .cta-wa    { background:#22c55e; color:#fff; box-shadow:0 4px 16px rgba(34,197,94,.35); }
      .cta-ico   { width:22px; height:22px; flex-shrink:0; }

      /* ── Formulário ── */
      .qp-form  { display:grid; gap:12px; margin-bottom:24px; text-align:left; }
      .qp-field { display:flex; flex-direction:column; gap:6px; }
      .qp-label { font-size:13px; font-weight:600; color:var(--ink2); letter-spacing:.01em; }
      .qp-input {
        padding:12px 14px; border:1.5px solid var(--border); border-radius:var(--radius-sm);
        font-family:var(--font-b); font-size:14px; color:var(--ink); background:var(--surface);
        transition:border-color .2s, box-shadow .2s; outline:none; width:100%;
      }
      .qp-input::placeholder { color:var(--ink3); }
      .qp-input:focus { border-color:var(--p); box-shadow:0 0 0 3px var(--p20); }

      /* ── Resultado obrigado ── */
      .res-obrigado { font-size:15px; color:rgba(255,255,255,.92); font-weight:500; margin-bottom:6px; line-height:1.5; position:relative; }
      .res-sub      { font-size:13px; color:rgba(255,255,255,.7); margin-bottom:8px; position:relative; }

      /* ── Keyframes ── */
      @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
      @keyframes spin    { to{transform:rotate(360deg)} }
      @keyframes pulse   { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(.9);opacity:.7} }

      /* ── Mobile ── */
      @media(max-width:480px){
        .qp-intro,.res-body { padding:28px 20px; }
        .qp-prog { padding:16px 20px 0; }
        .qp-q    { padding:20px 20px 28px; }
        .res-hero{ padding:30px 20px; }
        .res-body{ padding:20px 20px 28px; }
        .meta-g  { grid-template-columns:1fr; }
      }
    `;

    /* ── COMPONENTE ── */
    function QuizPeptidios() {
      const [etapa, setEtapa]         = useState('inicio');
      const [qIdx,  setQIdx]          = useState(0);
      const [selIdx, setSelIdx]       = useState(null);
      const [peptidio, setPeptidio]   = useState(null);
      const [nome, setNome]           = useState('');
      const [contato, setContato]     = useState('');
      const [respostas, setRespostas] = useState({
        genero: null, idade: null, objetivo: null, esporte: null,
        pontuacoes: { Recuperacao:0, 'Anti-Aging':0, Sexual:0, Longevidade:0, EmagRapido:0, EmagGradual:0, ComposicaoCorporal:0 },
      });

      useEffect(() => {
        if (document.getElementById('qp-css')) return;
        const s = document.createElement('style');
        s.id = 'qp-css';
        s.textContent = CSS_TEXT;
        document.head.appendChild(s);
      }, []);

      const calcular = (r) => {
        let cands = PEPTIDIOS.filter(p =>
          (!r.genero   || p.genero.includes(r.genero)) &&
          (!r.idade    || (p.idadeMin <= r.idade && r.idade <= p.idadeMax)) &&
          (!r.objetivo || p.objetivos.includes(r.objetivo)) &&
          (!r.esporte  || p.esportes.includes(r.esporte))
        );
        if (!cands.length) cands = PEPTIDIOS;
        let best = cands[0], bestPts = -1;
        cands.forEach(p => {
          const pts = r.pontuacoes[p.categoria] || 0;
          if (pts > bestPts) { bestPts = pts; best = p; }
        });
        setPeptidio(best);
        setEtapa('resultado');
      };

      const handleOpc = (op, idx) => {
        setSelIdx(idx);
        const r = { ...respostas, pontuacoes: { ...respostas.pontuacoes } };
        if      (op.categoria === 'genero')   r.genero   = op.valor;
        else if (op.categoria === 'idade')    r.idade    = op.valor;
        else if (op.categoria === 'objetivo') r.objetivo = op.valor;
        else if (op.categoria === 'esporte')  r.esporte  = op.valor;
        else r.pontuacoes[op.categoria] = (r.pontuacoes[op.categoria] || 0) + op.pontos;
        setRespostas(r);
        setTimeout(() => {
          setSelIdx(null);
          if (qIdx < PERGUNTAS.length - 1) {
            setQIdx(i => i + 1);
          } else {
            setEtapa('carregamento');
            setTimeout(() => calcular(r), 2300);
          }
        }, 320);
      };

      const reiniciar = () => {
        setQIdx(0); setSelIdx(null); setPeptidio(null);
        setRespostas({ genero:null, idade:null, objetivo:null, esporte:null,
          pontuacoes:{ Recuperacao:0, 'Anti-Aging':0, Sexual:0, Longevidade:0, EmagRapido:0, EmagGradual:0, ComposicaoCorporal:0 } });
        setEtapa('inicio');
        window.scrollTo({ top:0, behavior:'smooth' });
      };

      const pct = Math.round(((qIdx + 1) / PERGUNTAS.length) * 100);

      return (
        <div className="qp">
          <div className="qp-w">

            <div className="qp-card">

              {/* ── INTRO ── */}
              {etapa === 'inicio' && (
                <div className="qp-intro">
                  <div className="qp-intro-icon">🧬</div>
                  <h1>Descubra seu<br /><em>Peptídio Ideal</em></h1>
                  <p>Responda 13 perguntas rápidas sobre seu perfil, objetivos e estilo de vida. Nosso algoritmo identifica o peptídio mais adequado para você.</p>
                  <div className="qp-pills">
                    {['Personalizado','~3 minutos','8 peptídios','Gratuito'].map(t => (
                      <span className="qp-pill" key={t}>{t}</span>
                    ))}
                  </div>
                  <div className="qp-form">
                    <div className="qp-field">
                      <label className="qp-label">Seu nome</label>
                      <input
                        className="qp-input"
                        type="text"
                        placeholder="Como devemos te chamar?"
                        value={nome}
                        onChange={e => setNome(e.target.value)}
                      />
                    </div>
                    <div className="qp-field">
                      <label className="qp-label">Número de contato (WhatsApp)</label>
                      <input
                        className="qp-input"
                        type="tel"
                        placeholder="+55 (11) 99999-9999"
                        value={contato}
                        onChange={e => setContato(e.target.value)}
                      />
                    </div>
                  </div>
                  <button
                    className="btn"
                    onClick={() => { if (nome.trim() && contato.trim()) setEtapa('quiz'); }}
                    style={{ opacity: (nome.trim() && contato.trim()) ? 1 : 0.45, cursor: (nome.trim() && contato.trim()) ? 'pointer' : 'not-allowed' }}
                  >
                    Começar Quiz
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                      <path d="M5 12h14M12 5l7 7-7 7"/>
                    </svg>
                  </button>
                </div>
              )}

              {/* ── QUIZ ── */}
              {etapa === 'quiz' && (
                <>
                  <div className="qp-prog">
                    <div className="qp-prog-top">
                      <span className="qp-prog-lbl">Progresso</span>
                      <span className="qp-prog-n">{qIdx + 1} / {PERGUNTAS.length}</span>
                    </div>
                    <div className="qp-track">
                      <div className="qp-fill" style={{ width: `${pct}%` }} />
                    </div>
                  </div>

                  <div className="qp-q" key={qIdx}>
                    <div className="qp-q-badge">Pergunta {qIdx + 1}</div>
                    <h2 className="qp-q-text">{PERGUNTAS[qIdx].texto}</h2>
                    <div className="qp-opts">
                      {PERGUNTAS[qIdx].opcoes.map((op, i) => (
                        <button
                          key={i}
                          className={`qp-opt${selIdx === i ? ' sel' : ''}`}
                          onClick={() => handleOpc(op, i)}
                          disabled={selIdx !== null}
                        >
                          <div className="dot" />
                          <span>{op.texto}</span>
                        </button>
                      ))}
                    </div>
                  </div>
                </>
              )}

              {/* ── LOADING ── */}
              {etapa === 'carregamento' && (
                <div className="qp-load">
                  <div className="spin-wrap">
                    <div className="ring" />
                    <div className="ring" />
                    <div className="spin-core">🧬</div>
                  </div>
                  <h2>Analisando seu perfil</h2>
                  <p>Processando suas respostas para encontrar<br />o peptídio mais adequado…</p>
                  <div className="load-steps">
                    {['Avaliando objetivos e perfil','Cruzando dados biométricos','Selecionando peptídio ideal'].map((s,i) => (
                      <div className="load-step" key={i}>
                        <div className="step-dot" />{s}
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* ── RESULTADO ── */}
              {etapa === 'resultado' && peptidio && (
                <div className="qp-res">
                  <div className="res-hero">
                    <div className="res-badge">✦ Recomendação Personalizada</div>
                    <span className="res-icon">{peptidio.icone}</span>
                    <p className="res-obrigado">Obrigado por responder com honestidade{nome ? `, ${nome}` : ''}.</p>
                    <p className="res-sub">Baseado em seu perfil a melhor alternativa para o seu caso é:</p>
                    <div className="res-name">{peptidio.nome}</div>
                  </div>

                  <div className="res-body">
                    <div className="sec">
                      <div className="sec-title">Benefícios principais</div>
                      <div className="benefits">
                        {peptidio.beneficios.map((b,i) => (
                          <div className="benefit" key={i}>
                            <div className="chk">✓</div>
                            <span>{b}</span>
                          </div>
                        ))}
                      </div>
                    </div>

                    <div className="sec">
                      <div className="sec-title">Por que este peptídio é ideal para você</div>
                      <div className="reason">{peptidio.porQueEficaz}</div>
                    </div>

                    <div className="meta-g">
                      <div className="meta-c">
                        <div className="meta-cl">⏱ Duração</div>
                        <div className="meta-cv">{peptidio.duracao}</div>
                      </div>
                      <div className="meta-c">
                        <div className="meta-cl">📈 Expectativa</div>
                        <div className="meta-cv">{peptidio.expectativa}</div>
                      </div>
                    </div>

                    <div className="divider" />

                    <div className="disc">
                      ⚠️ <strong>Aviso:</strong> Esta recomendação é informativa e não substitui consulta médica. Consulte um profissional de saúde antes de iniciar qualquer protocolo.
                    </div>

                    <div className="ctas">
                      <a
                        href={`https://wa.me/${BRANDING.telefone.replace(/\D/g,'')}?text=${encodeURIComponent('Olá '+BRANDING.nome+'! Me chamo '+nome+' e fiz o quiz. Meu peptídio recomendado foi *'+peptidio.nome+'*. Gostaria de saber mais.')}`}
                        target="_blank"
                        rel="noopener noreferrer"
                        className="cta-a cta-wa"
                      >
                        <svg className="cta-ico" viewBox="0 0 24 24" fill="currentColor">
                          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347"/>
                          <path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.553 4.116 1.524 5.847L.057 23.172a.75.75 0 0 0 .92.92l5.328-1.466A11.945 11.945 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0m0 22c-1.907 0-3.694-.5-5.24-1.375l-.376-.215-3.904 1.075 1.074-3.905-.215-.375A9.953 9.953 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10"/>
                        </svg>
                        Falar no WhatsApp
                      </a>
                    </div>
                  </div>
                </div>
              )}

            </div>

          </div>
        </div>
      );
    }

    /* ── RENDER ── */
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<QuizPeptidios />);
  </script>
</body>
</html>
